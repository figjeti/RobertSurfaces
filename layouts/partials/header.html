<header class="site-header">
  <div class="container header-inner">
    <a href="/" class="logo">
      <span class="logo-icon">&#9654;</span>
      <span class="logo-text">Roadrunner<strong>Surfaces</strong></span>
    </a>
    <button class="menu-toggle" aria-label="Toggle menu" onclick="document.querySelector('.nav-menu').classList.toggle('active')">
      <span></span><span></span><span></span>
    </button>
    <nav class="nav-menu">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}">{{ .Name }}</a>
      {{ end }}
      <a href="tel:{{ .Site.Params.phone }}" class="nav-cta">{{ .Site.Params.phone }}</a>
    </nav>
  </div>
</header>
